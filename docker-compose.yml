services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: change_seams
      POSTGRES_PASSWORD: change_seams
      POSTGRES_DB: change_seams
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U change_seams"]
      interval: 5s
      retries: 5

  backend:
    build: .
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
